<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Logistics Management System</title>
  <meta name="description" content="Secure login portal for the Logistics Management System. Manage truck entries, material movements, and warehouse operations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    /* ── Login Page Specific ── */
    body.login-page {
      background: #D3D1CE;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    body.login-page::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(250, 131, 23, 0.15) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
    }
    body.login-page::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      bottom: -100px; left: -50px;
      border-radius: 50%;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.6s ease-out;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-brand .brand-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #E06B00, #FA8317);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      box-shadow: 0 8px 24px rgba(250, 131, 23, 0.4);
    }

    .login-brand h1 {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      color: #111827;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .login-brand p {
      color: #6B7280;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .login-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.9);
    }

    .login-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.25rem;
    }

    .login-card .subtitle {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 0.4rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 0.75rem 0.875rem 0.75rem 2.75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: all 0.2s ease;
      outline: none;
      box-sizing: border-box;
    }

    .form-input:focus, .form-select:focus {
      border-color: #FA8317;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(250, 131, 23, 0.15);
    }

    .form-input.error, .form-select.error {
      border-color: var(--danger);
      background: #fff5f5;
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .role-option {
      position: relative;
    }

    .role-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
    }

    .role-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      padding: 0.875rem;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--gray-50);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--gray-600);
    }

    .role-label .role-icon {
      font-size: 1.5rem;
    }

    .role-option input[type="radio"]:checked + .role-label {
      border-color: var(--primary);
      background: rgba(250, 131, 23, 0.06);
      color: var(--primary);
    }

    .role-label:hover {
      border-color: var(--primary-light);
      background: rgba(250, 131, 23, 0.03);
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #E06B00, #FA8317);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(250, 131, 23, 0.25);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(250, 131, 23, 0.45);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-login .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    .error-message {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #DC2626;
      font-size: 0.8125rem;
      margin-top: 1rem;
      display: none;
    }

    .error-message.visible {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .demo-credentials {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #FFFBF7;
      border: 1px solid #FFE9D1;
      border-radius: 10px;
    }

    .demo-credentials h4 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #D97706;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .demo-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--gray-600);
      padding: 0.15rem 0;
    }

    .demo-row strong { color: var(--gray-800); }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
      </div>
      <h1>Logistics MS</h1>
      <p>Truck Entry &amp; Material Management</p>
    </div>

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account to continue</p>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper" style="position: relative;">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); pointer-events: none;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input type="text" id="username" class="form-input" placeholder="Enter your username" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper" style="position: relative;">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); pointer-events: none;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
          </div>
        </div>

        <div class="form-group">
          <label>Select Role</label>
          <div class="role-grid">
            <div class="role-option">
              <input type="radio" id="role-admin" name="role" value="admin" checked />
              <label for="role-admin" class="role-label">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="role-icon" style="margin-bottom: 0.25rem;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Admin
              </label>
            </div>
            <div class="role-option">
              <input type="radio" id="role-supervisor" name="role" value="supervisor" />
              <label for="role-supervisor" class="role-label">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="role-icon" style="margin-bottom: 0.25rem;"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
                Supervisor
              </label>
            </div>
          </div>
        </div>

        <div id="error-message" class="error-message"></div>

        <button type="submit" id="login-btn" class="btn-login">
          Sign In
        </button>

        <div class="demo-credentials">
          <h4>🔑 Demo Credentials</h4>
          <div class="demo-row"><span>Admin:</span> <strong>admin / admin123</strong></div>
          <div class="demo-row"><span>Supervisor:</span> <strong>supervisor / supervisor123</strong></div>
        </div>
      </form>
    </div>

    <div class="login-footer">
      &copy; 2024 Logistics Management System &bull; Enterprise Edition
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-message');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const role = document.querySelector('input[name="role"]:checked').value;

      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      errEl.classList.remove('visible');

      try {
        const res = await fetch('https://logistics-management-system-8dfp.onrender.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password, role }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed. Please try again.';
          errEl.classList.add('visible');
          btn.classList.remove('loading');
          btn.innerHTML = 'Sign In';
          return;
        }

        // Store user info and redirect
        sessionStorage.setItem('lms_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = 'Cannot connect to server. Please ensure the server is running.';
        errEl.classList.add('visible');
        btn.classList.remove('loading');
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
